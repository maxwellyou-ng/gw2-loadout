# Gates are offline (the wiki snapshot, golden totals, and test fixtures are
# committed) except wiki:ids, which cross-checks every referenced item/currency
# id against the official GW2 API — it self-skips (exit 0, loud notice) when
# the API is unreachable so an ArenaNet outage can't block CI.
name: CI

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc -b --noEmit
      - name: Lint
        run: npm run lint
      - name: Engine checks (consumption, invariants, recommendations)
        run: npm run check
      - name: Wiki drift gate (per combine)
        run: npm run wiki:check
      - name: Totals gate (full-tree + golden snapshot)
        run: npm run wiki:totals
      - name: Id gate (name↔id vs GW2 API, discontinued tenders)
        run: npm run wiki:ids
      - name: Wiki parser/expander tests
        run: npm run wiki:test
      - name: Production build
        run: npm run build
